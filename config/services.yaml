services:
    _defaults:
        autowire: true
        autoconfigure: true

    PsychedCms\Auth\:
        resource: '../src/'
        exclude:
            - '../src/Entity/'
            - '../src/PsychedCmsAuthBundle.php'

    PsychedCms\Auth\Repository\UserRepositoryInterface:
        alias: PsychedCms\Auth\Repository\UserRepository

    PsychedCms\Auth\State\UserPasswordProcessor:
        arguments:
            $persistProcessor: '@api_platform.doctrine.orm.state.persist_processor'

    PsychedCms\Auth\Security\PermissionRegistry:
        arguments:
            $roleHierarchy: '@security.role_hierarchy'

    PsychedCms\Auth\Controller\ForgotPasswordController:
        arguments:
            $forgotPasswordLimiter: '@limiter.forgot_password'

    PsychedCms\Auth\Controller\ResetPasswordController:
        arguments:
            $resetPasswordLimiter: '@limiter.reset_password'

    PsychedCms\Auth\Controller\RegisterController:
        arguments:
            $registerLimiter: '@limiter.register'
            $cookieDomain: '%env(COOKIE_DOMAIN)%'
            $appEnv: '%kernel.environment%'

    PsychedCms\Auth\Controller\AcceptInvitationController:
        arguments:
            $acceptInvitationLimiter: '@limiter.accept_invitation'

    PsychedCms\Auth\Controller\ResendVerificationController:
        arguments:
            $resendVerificationLimiter: '@limiter.resend_verification'

    PsychedCms\Auth\Controller\ResendInvitationController:
        arguments:
            $resendInvitationLimiter: '@limiter.resend_invitation'

    PsychedCms\Auth\Service\PasswordResetMailer:
        arguments:
            $adminUrl: '%env(ADMIN_URL)%'
            $fromAddress: '%env(default:password_reset_from_default:PASSWORD_RESET_FROM)%'

    PsychedCms\Auth\Service\InvitationMailer:
        arguments:
            $adminUrl: '%env(ADMIN_URL)%'
            $frontendUrl: '%env(FRONTEND_URL)%'
            $fromAddress: '%env(default:password_reset_from_default:PASSWORD_RESET_FROM)%'

parameters:
    password_reset_from_default: 'noreply@hilo.local'
